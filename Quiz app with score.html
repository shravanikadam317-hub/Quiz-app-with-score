<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .quiz-box {
            background: white;
            width: 500px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        .option {
            display: block;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
            background: #f4f4f4;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .option:hover {
            background: #e0e7ff;
        }

        .correct {
            border: 2px solid green;
            background-color: #d4edda;
        }

        .wrong {
            border: 2px solid red;
            background-color: #f8d7da;
        }

        button {
            margin-top: 15px;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #5563c1;
        }

        .score {
            font-size: 18px;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="quiz-box">
    <h2>📝 Quiz App</h2>
    <div id="question"></div>
    <div id="options"></div>
    <button id="nextBtn">Next</button>
    <div id="scoreBox" class="score"></div>
</div>

<script>

    // 1️⃣ Array of questions
    const quizData = [
        {
            question: "Which language runs in a web browser?",
            options: ["Java", "C", "Python", "JavaScript"],
            correct: 3
        },
        {
            question: "Which company developed JavaScript?",
            options: ["Microsoft", "Netscape", "Google", "IBM"],
            correct: 1
        },
        {
            question: "Which symbol is used for single-line comments in JS?",
            options: ["//", "##", "<!-- -->", "**"],
            correct: 0
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("nextBtn");
    const scoreBox = document.getElementById("scoreBox");

    // Load Question
    function loadQuestion() {
        answered = false;
        questionEl.innerHTML = "<h3>" + quizData[currentQuestion].question + "</h3>";
        optionsEl.innerHTML = "";

        quizData[currentQuestion].options.forEach(function(option, index) {
            const div = document.createElement("div");
            div.classList.add("option");
            div.textContent = option;

            div.addEventListener("click", function() {
                if (answered) return;

                answered = true;

                if (index === quizData[currentQuestion].correct) {
                    div.classList.add("correct");
                    score++;
                } else {
                    div.classList.add("wrong");

                    // Show correct answer in green
                    document.querySelectorAll(".option")[quizData[currentQuestion].correct]
                        .classList.add("correct");
                }
            });

            optionsEl.appendChild(div);
        });
    }

    // Next Button
    nextBtn.addEventListener("click", function() {

        if (!answered) {
            alert("Please select an answer!");
            return;
        }

        currentQuestion++;

        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    });

    // Show Final Score
    function showScore() {
        questionEl.innerHTML = "";
        optionsEl.innerHTML = "";
        nextBtn.style.display = "none";
        scoreBox.innerHTML = "🎉 Your Final Score: " + score + " / " + quizData.length;
    }

    // Start quiz
    loadQuestion();

</script>

</body>
</html>
